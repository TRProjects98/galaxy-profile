name: Generate Profile SVGs

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    paths:
      - "config.yml"
      - "generator/**"

jobs:
  generate:
    name: Generate galaxy profile assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m generator.main

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generated/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update profile SVGs [skip ci]"
            git push
          fi

      - name: Push assets to profile repo
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          PROFILE_REPO_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${PROFILE_REPO_TOKEN}@github.com/TRProjects98/TRProjects98.git profile-repo

          mkdir -p profile-repo/assets/generated/
          cp -r assets/generated/. profile-repo/assets/generated/
          cp README.md profile-repo/README.md        # <-- adiciona esta linha

          cd profile-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generated/ README.md        # <-- adiciona README.md aqui também
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync profile SVGs [skip ci]"
            git push
          else
            echo "No changes to push to profile repo."
          fi
